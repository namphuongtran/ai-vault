name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-markdown:
    name: Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint Markdown
        run: npm run lint:md

  build:
    name: Build (catch content & template errors)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go (for the Docsy Hugo module)
        uses: actions/setup-go@v7
        with:
          go-version: stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      # `hugo` exits non-zero on any build error, including broken internal
      # relref/ref links and template failures — so this fails the CI on them.
      - name: Build site
        run: npx hugo --minify --gc
